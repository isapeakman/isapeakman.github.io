name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Download LoveIt theme
        run: |
          mkdir -p themes
          git clone --depth 1 https://github.com/dillonzq/LoveIt.git themes/LoveIt
          rm -rf themes/LoveIt/.git
          ls -la themes/LoveIt/  # 验证主题已下载

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.125.7"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Verify build
        run: |
          ls -la public/
          if [ -f "public/index.html" ]; then
            echo "✅ Build successful!"
            head -5 public/index.html
          else
            echo "❌ Build failed - no index.html"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4